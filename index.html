<!DOCTYPE html>
<html lang="nl"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecopulz — Command Center</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:#00B593; --teal-dim:rgba(0,181,147,.12); --teal-b:rgba(0,181,147,.24); --teal-glow:0 0 22px rgba(0,181,147,.22);
      --salmon:#FF8072; --sal-dim:rgba(255,128,114,.11); --sal-b:rgba(255,128,114,.24);
      --blue:#A8E0E0; --blue-dim:rgba(168,224,224,.09); --blue-b:rgba(168,224,224,.22);
      --yellow:#F5C542; --red:#E53535;
      --bg:#1c1e1c; --sb:#252725; --card:#212321; --ch:#282b28; --inp:#191b19;
      --t1:#eef0ee; --t2:#96a496; --t3:#576057;
      --bd:rgba(255,255,255,.062); --bdm:rgba(255,255,255,.11);
      --sbw:220px; --sbw-col:56px; --tbh:60px;
      --f:'Poppins',sans-serif; --r:3px;
    }
    html,body { height:100%; font-family:var(--f); background:var(--bg); color:var(--t1); -webkit-font-smoothing:antialiased; }
    .app { display:flex; height:100vh; overflow:hidden; }
    .sidebar { width:var(--sbw); min-width:var(--sbw); background:var(--sb); border-right:1px solid var(--bd); display:flex; flex-direction:column; z-index:100; flex-shrink:0; transition:width .22s ease,min-width .22s ease; overflow:hidden; }
    .sidebar.collapsed { width:var(--sbw-col); min-width:var(--sbw-col); }
    .sb-logo { padding:16px 14px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:9px; min-height:64px; cursor:pointer; }
    .sidebar.collapsed .sb-logo { justify-content:center; padding:16px 0; }
    .logo-pulse { width:7px; height:7px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px var(--teal),0 0 14px rgba(0,181,147,.28); flex-shrink:0; animation:pulse 2.8s ease-in-out infinite; }
    .sidebar.collapsed .logo-pulse { display:none; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .logo-text { overflow:hidden; white-space:nowrap; }
    .sidebar.collapsed .logo-text { display:none; }
    .logo-title { font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--t1); }
    .logo-sub { font-size:9.5px; color:var(--t3); margin-top:1px; }
    .logo-ast { width:28px; height:28px; flex-shrink:0; background:var(--teal-dim); border:1px solid var(--teal-b); border-radius:2px; display:none; align-items:center; justify-content:center; }
    .sidebar.collapsed .logo-ast { display:flex; }
    .logo-ast svg { width:16px; height:16px; color:var(--teal); }
    .sb-nav { flex:1; padding:6px 0; overflow-y:auto; overflow-x:hidden; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 14px 9px 15px; cursor:pointer; position:relative; transition:background .12s; user-select:none; white-space:nowrap; }
    .sidebar.collapsed .nav-item { justify-content:center; padding:10px 0; }
    .nav-item:hover { background:rgba(255,255,255,.03); }
    .nav-item.active { background:var(--teal-dim); }
    .nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2.5px; background:var(--teal); box-shadow:var(--teal-glow); }
    .sidebar.collapsed .nav-item.active::before { display:none; }
    .nav-icon { width:16px; height:16px; flex-shrink:0; color:var(--t3); transition:color .12s; }
    .nav-item.active .nav-icon { color:var(--teal); }
    .nav-item:hover .nav-icon { color:var(--t2); }
    .nav-label { font-size:12.5px; font-weight:500; color:var(--t2); flex:1; transition:color .12s; overflow:hidden; }
    .sidebar.collapsed .nav-label { display:none; }
    .nav-item.active .nav-label { color:var(--teal); font-weight:600; }
    .nav-item:hover .nav-label { color:var(--t1); }
    .nav-badge { background:var(--red); color:#fff; font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:10px; min-width:18px; text-align:center; }
    .sidebar.collapsed .nav-badge { position:absolute; top:4px; right:4px; font-size:8px; padding:1px 4px; min-width:14px; }
    .sb-user { padding:11px 13px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:10px; }
    .sidebar.collapsed .sb-user { justify-content:center; padding:11px 0; }
    .user-av { width:30px; height:30px; border-radius:50%; background:var(--teal-dim); border:1.5px solid var(--teal-b); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--teal); flex-shrink:0; }
    .user-info { overflow:hidden; }
    .sidebar.collapsed .user-info { display:none; }
    .user-name { font-size:12.5px; font-weight:600; color:var(--t1); white-space:nowrap; }
    .user-role { font-size:10px; color:var(--t3); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .topbar { height:var(--tbh); border-bottom:1px solid var(--bd); display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0; }
    .tb-left { flex:1; min-width:0; }
    .page-title { font-size:15px; font-weight:700; color:var(--t1); }
    .page-date { font-size:10.5px; color:var(--t3); margin-top:1px; }
    .tb-actions { display:flex; gap:8px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; font-family:var(--f); font-size:12px; font-weight:600; border-radius:var(--r); border:1.5px solid transparent; cursor:pointer; transition:all .13s; white-space:nowrap; line-height:1; }
    .btn-ghost { background:transparent; border-color:var(--bdm); color:var(--t2); }
    .btn-ghost:hover { border-color:rgba(255,255,255,.2); color:var(--t1); background:rgba(255,255,255,.04); }
    .btn-teal { background:var(--teal); border-color:var(--teal); color:#fff; }
    .btn-teal:hover { background:#00cba6; box-shadow:0 0 18px rgba(0,181,147,.32); }
    .btn-red { background:#e53535; border-color:#e53535; color:#fff; }
    .btn-red:hover { background:#cc2020; box-shadow:0 0 14px rgba(229,53,53,.28); }
    .btn-ghost-red { background:transparent; border-color:rgba(229,53,53,.35); color:#e57575; }
    .btn-ghost-red:hover { border-color:#e53535; color:#e53535; background:rgba(229,53,53,.06); }
    .btn-sm { padding:5px 11px; font-size:11px; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-green { background:#22c55e; border-color:#22c55e; color:#fff; }
    .btn-green:hover { background:#16a34a; box-shadow:0 0 14px rgba(34,197,94,.32); }
    .btn-blue-sf { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .btn-blue-sf:hover { background:#2563eb; box-shadow:0 0 14px rgba(59,130,246,.32); }
    .btn-sent { background:rgba(255,255,255,.07) !important; border-color:var(--bdm) !important; color:var(--t3) !important; cursor:not-allowed !important; }
    .sf-wrap { margin-top:10px; padding-top:10px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .sf-gereageerd { display:inline-flex; align-items:center; font-size:11px; font-weight:700; padding:4px 10px; background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-b); border-radius:2px; }
    .sf-dagen { font-size:11px; color:var(--t2); }
    .sf-dagen.laat { color:#fb923c; font-weight:600; }
    .content-area { flex:1; overflow-y:auto; padding:24px; }
    .filter-row { display:flex; margin-bottom:18px; border-bottom:1px solid var(--bd); }
    .fbtn { padding:7px 14px; font-family:var(--f); font-size:12px; font-weight:600; color:var(--t3); background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .13s; }
    .fbtn:hover { color:var(--t1); }
    .fbtn.active { color:var(--teal); border-bottom-color:var(--teal); }
    .w-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
    .widget { background:var(--card); border:1px solid var(--bd); padding:18px 18px 15px; position:relative; cursor:pointer; transition:border-color .15s,box-shadow .15s; }
    .widget:hover { border-color:var(--teal-b); box-shadow:var(--teal-glow); }
    .widget::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
    .w-teal::before { background:var(--teal); box-shadow:2px 0 12px rgba(0,181,147,.28); }
    .w-sal::before { background:var(--salmon); }
    .w-blue::before { background:var(--blue); }
    .w-gray::before { background:var(--t3); }
    .w-num { font-size:38px; font-weight:800; line-height:1; margin-bottom:5px; font-variant-numeric:tabular-nums; }
    .w-teal .w-num{color:var(--teal);} .w-sal .w-num{color:var(--salmon);} .w-blue .w-num{color:var(--blue);} .w-gray .w-num{color:var(--t2);}
    .w-label { font-size:13px; font-weight:600; color:var(--t1); margin-bottom:2px; }
    .w-sub { font-size:10.5px; color:var(--t3); }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
    .card { background:var(--card); border:1px solid var(--bd); padding:18px; }
    .card-title { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:14px; }
    .prev-item { display:flex; align-items:center; gap:11px; padding:9px 6px; border-bottom:1px solid var(--bd); cursor:pointer; transition:background .12s; border-radius:var(--r); }
    .prev-item:last-child { border-bottom:none; padding-bottom:0; }
    .prev-item:hover { background:rgba(255,255,255,.04); }
    .l-av { width:32px; height:32px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
    .l-av.t1{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-b);}
    .l-av.t2{background:var(--sal-dim);color:var(--salmon);border:1px solid var(--sal-b);}
    .prev-inf { flex:1; min-width:0; }
    .prev-n { font-size:13px; font-weight:600; color:var(--t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .prev-c { font-size:11px; color:var(--t3); }
    .tier-b { font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:2px; flex-shrink:0; }
    .tier-b.t1{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-b);}
    .tier-b.t2{background:var(--sal-dim);color:var(--salmon);border:1px solid var(--sal-b);}
    .score-n { font-size:11px; color:var(--t3); flex-shrink:0; }
    .tp-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--bd); }
    .tp-item:last-child { border-bottom:none; }
    .t-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .t-dot.urgent{background:var(--salmon);box-shadow:0 0 6px rgba(255,128,114,.45);}
    .t-dot.normal{background:var(--t3);}
    .t-txt { font-size:12px; color:var(--t1); flex:1; line-height:1.4; }
    .t-txt.urgent{color:var(--salmon);}
    .t-dl { font-size:10.5px; color:var(--t3); flex-shrink:0; }
    .t-dl.urgent{color:var(--salmon);font-weight:600;}
    .sig-item { display:flex; align-items:center; gap:13px; padding:12px 0; border-bottom:1px solid var(--bd); transition:background .12s; }
    .sig-item:last-child { border-bottom:none; }
    .sig-item:hover { background:rgba(255,255,255,.03); }
    .sig-b { font-size:9.5px; font-weight:700; padding:3px 8px; border-radius:2px; white-space:nowrap; flex-shrink:0; }
    .sig-b.aanbesteding{background:var(--sal-dim);color:var(--salmon);border:1px solid var(--sal-b);}
    .sig-b.nieuws{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-b);}
    .sig-b.kans{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-b);}
    .sig-b.concurrent{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--bdm);}
    .sig-inf { flex:1; min-width:0; }
    .sig-t { font-size:13px; font-weight:500; color:var(--t1); line-height:1.35; }
    .sig-m { font-size:10.5px; color:var(--t3); margin-top:2px; }
    .sig-sc { text-align:right; flex-shrink:0; }
    .sig-v { font-size:12px; font-weight:700; color:var(--teal); }
    .sig-s { font-size:9px; color:var(--t3); }
    .sig-sum { font-size:11px; color:var(--t3); margin-top:3px; line-height:1.4; }
    .sig-idee { font-size:11px; color:var(--teal); margin-top:5px; font-style:italic; }
    .btn-xs { padding:3px 9px; font-size:10.5px; }
    .reactie-card { background:var(--card); border:1px solid var(--bd); padding:16px; margin-bottom:8px; transition:border-color .13s; }
    .reactie-card:hover { border-color:var(--bdm); }
    .reactie-card.koopsignaal { border-left:3px solid var(--yellow); }
    .reactie-voorstel { background:var(--inp); border:1px solid var(--bd); padding:12px; font-size:12px; line-height:1.6; color:var(--t2); margin:10px 0; white-space:pre-wrap; }
    .badge-koop { background:rgba(245,197,66,.12); color:var(--yellow); border:1px solid rgba(245,197,66,.22); font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:2px; }
    .badge-nieuw { background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-b); font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:2px; }
    .badge-gereageerd { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-b); font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:2px; }
    .badge-overgeslagen { background:rgba(255,255,255,.05); color:var(--t3); border:1px solid var(--bdm); font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:2px; }
    .bedrijf-card { background:var(--card); border:1px solid var(--bd); padding:18px; margin-bottom:8px; transition:border-color .13s; }
    .bedrijf-card:hover { border-color:var(--bdm); }
    .bedrijf-naam { font-size:15px; font-weight:700; color:var(--t1); margin-bottom:4px; }
    .bedrijf-meta { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
    .bedrijf-reden { font-size:11.5px; color:var(--teal); font-style:italic; margin:8px 0; line-height:1.5; }
    .bedrijf-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .phase-nav { display:grid; grid-template-columns:1fr 22px 1fr 22px 1fr 22px 1fr 22px 1fr; align-items:stretch; margin-bottom:22px; }
    .phase-step { background:var(--card); border:1px solid var(--bd); padding:16px 16px 14px; cursor:pointer; transition:background .14s; position:relative; }
    .phase-step:hover { background:var(--ch); }
    .phase-step.active { background:var(--teal-dim); border-color:var(--teal-b); }
    .phase-arrow { background:var(--card); border-top:1px solid var(--bd); border-bottom:1px solid var(--bd); display:flex; align-items:center; justify-content:center; }
    .phase-arrow svg { color:var(--t3); }
    .p-num { font-size:9px; font-weight:800; letter-spacing:.15em; color:var(--t3); margin-bottom:4px; }
    .phase-step.active .p-num { color:var(--teal); }
    .p-label { font-size:14px; font-weight:700; color:var(--t1); display:block; margin-bottom:2px; }
    .p-sub { font-size:10.5px; color:var(--t3); }
    .p-count { font-size:10px; color:var(--t2); margin-top:6px; }
    .phase-step.active .p-count { color:var(--teal); }
    .this-sys { position:absolute; top:12px; right:12px; font-size:8px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:2px 7px; border-radius:2px; background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-b); }
    .leads-list { display:flex; flex-direction:column; gap:2px; }
    .lead-row { background:var(--card); border:1px solid var(--bd); transition:border-color .14s; }
    .lead-row:hover { border-color:var(--bdm); }
    .lead-row.open { border-color:var(--teal-b); }
    .lead-hdr { display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer; user-select:none; }
    .sdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .sdot.nieuw{background:var(--blue);}
    .sdot.benaderd{background:var(--yellow);}
    .sdot.gereageerd{background:var(--teal);box-shadow:0 0 5px rgba(0,181,147,.5);}
    .l-name-blk { flex:1; min-width:0; }
    .l-name { font-size:13.5px; font-weight:600; color:var(--t1); }
    .l-co { font-size:11px; color:var(--t3); margin-top:1px; }
    .chev { color:var(--t3); flex-shrink:0; transition:transform .22s,color .14s; }
    .lead-row.open .chev { transform:rotate(180deg); color:var(--teal); }
    .lead-body { max-height:0; overflow:hidden; transition:max-height .32s cubic-bezier(.4,0,.2,1); }
    .lead-body.show { max-height:900px; }
    .lead-bdy-inner { padding:0 15px 20px; border-top:1px solid var(--bd); }
    .icp-row { display:flex; justify-content:space-between; align-items:center; margin:16px 0 6px; }
    .icp-lbl { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); }
    .icp-val { font-size:13px; font-weight:800; color:var(--teal); }
    .icp-trk { background:rgba(255,255,255,.07); height:5px; border-radius:99px; overflow:hidden; margin-bottom:14px; }
    .icp-fill { height:100%; background:var(--teal); border-radius:99px; box-shadow:0 0 8px rgba(0,181,147,.38); }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; margin-bottom:16px; }
    .d-lbl { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:3px; }
    .d-val { font-size:12.5px; color:var(--t1); }
    .d-val.m { color:var(--t2); font-size:12px; line-height:1.5; }
    .fspan { grid-column:1/-1; }
    .msg-blk { background:var(--inp); border:1px solid var(--bd); padding:13px; font-size:11.5px; line-height:1.65; color:var(--t2); white-space:pre-wrap; font-family:var(--f); max-height:170px; overflow-y:auto; margin-top:4px; }
    .actor-section-lbl { font-size:9px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--t3); margin-bottom:10px; margin-top:18px; }
    .actor-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
    .actor-col { border:1px solid var(--bd); border-top:2px solid; padding:11px; }
    .actor-col.klant{border-top-color:var(--salmon);}
    .actor-col.commercial{border-top-color:var(--teal);}
    .actor-col.platform{border-top-color:var(--blue);}
    .actor-col.ai{border-top-color:var(--t2);}
    .ac-hdr { font-size:9.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
    .actor-col.klant .ac-hdr{color:var(--salmon);}
    .actor-col.commercial .ac-hdr{color:var(--teal);}
    .actor-col.platform .ac-hdr{color:var(--blue);}
    .actor-col.ai .ac-hdr{color:var(--t2);}
    .ac-list { list-style:none; }
    .ac-list li { font-size:11px; color:var(--t2); line-height:1.45; padding:3px 0 3px 11px; position:relative; border-bottom:1px solid var(--bd); }
    .ac-list li:last-child { border-bottom:none; }
    .ac-list li::before { content:''; position:absolute; left:0; top:8px; width:4px; height:4px; border-radius:50%; }
    .actor-col.klant li::before{background:var(--salmon);}
    .actor-col.commercial li::before{background:var(--teal);}
    .actor-col.platform li::before{background:var(--blue);}
    .actor-col.ai li::before{background:var(--t2);}
    .tools-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .tool-tag { font-size:10px; font-weight:600; padding:3px 9px; border-radius:2px; background:rgba(255,255,255,.05); color:var(--t2); border:1px solid var(--bdm); }
    .streef-blk { background:rgba(0,181,147,.06); border:1px solid var(--teal-b); padding:12px 14px; margin-bottom:14px; }
    .streef-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .streef-lbl { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--teal); }
    .streef-pct { font-size:13px; font-weight:800; color:var(--teal); }
    .streef-trk { background:rgba(255,255,255,.08); height:4px; border-radius:99px; overflow:hidden; margin-bottom:8px; }
    .streef-fill { height:100%; background:var(--teal); border-radius:99px; }

/* === Campagnes === */
.cmp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
@media(max-width:900px){ .cmp-grid { grid-template-columns:1fr 1fr; } }
.cmp-card { background:var(--card); border:1px solid var(--bd); padding:16px 18px; cursor:pointer; transition:border-color .13s,transform .1s; }
.cmp-card:hover { border-color:var(--teal-b); transform:translateY(-1px); }
.cmp-card-naam { font-size:14px; font-weight:700; color:var(--t1); margin-bottom:4px; }
.cmp-card-sub { font-size:11.5px; color:var(--t2); line-height:1.4; margin-bottom:10px; }
.cmp-plats { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.cmp-plat-b { font-size:9px; font-weight:700; padding:2px 6px; border-radius:2px; text-transform:uppercase; letter-spacing:.04em; }
.cmp-plat-li { background:rgba(91,164,232,.15); color:#5BA4E8; border:1px solid rgba(91,164,232,.25); }
.cmp-plat-meta { background:rgba(240,112,144,.13); color:#F07090; border:1px solid rgba(240,112,144,.22); }
.cmp-plat-google { background:rgba(52,168,83,.14); color:#34A853; border:1px solid rgba(52,168,83,.24); }
.cmp-card-ft { display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid var(--bd); font-size:11px; color:var(--t3); }
.cmp-status-b { font-size:9px; font-weight:700; padding:2px 7px; border-radius:2px; text-transform:uppercase; letter-spacing:.04em; }
.cmp-b-concept { background:rgba(255,255,255,.07); color:var(--t3); border:1px solid var(--bd); }
.cmp-b-actief { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-b); }
.cmp-b-gepauzeerd { background:rgba(245,197,66,.12); color:#F5C542; border:1px solid rgba(245,197,66,.22); }
.cmp-b-afgerond { background:rgba(168,224,224,.1); color:var(--blue); border:1px solid rgba(168,224,224,.2); }
.cmp-detail-hdr { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.cmp-info-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; background:var(--ch); border:1px solid var(--bd); padding:14px 16px; border-radius:var(--r); margin-bottom:20px; }
.cmp-info-item { display:flex; flex-direction:column; gap:2px; }
.cmp-info-lbl { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--t3); }
.cmp-info-val { font-size:12.5px; color:var(--t1); }
.ad-card { background:var(--card); border:1px solid var(--bd); padding:12px 14px; margin-bottom:8px; border-radius:var(--r); }
.ad-card-hdr { display:flex; align-items:center; gap:8px; cursor:pointer; }
.ad-card-preview { font-size:12px; color:var(--t2); margin-top:8px; line-height:1.5; }
.ad-card-body { margin-top:12px; padding-top:12px; border-top:1px solid var(--bd); font-size:12px; color:var(--t2); line-height:1.6; }
.ad-status-b { font-size:9px; font-weight:700; padding:2px 6px; border-radius:2px; }
.ad-b-concept { background:rgba(255,255,255,.07); color:var(--t3); border:1px solid var(--bd); }
.ad-b-live { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-b); }
.ad-b-gepauzeerd { background:rgba(245,197,66,.12); color:#F5C542; border:1px solid rgba(245,197,66,.22); }
.cb-row { display:flex; align-items:center; gap:8px; padding:6px 0; cursor:pointer; font-size:12.5px; color:var(--t1); user-select:none; }
.cb-row input[type=checkbox] { width:14px; height:14px; accent-color:var(--teal); cursor:pointer; flex-shrink:0; }
/* === Concept Popup === */
.ci-modal { background:var(--sb); border:1px solid var(--bdm); width:700px; max-width:96vw; max-height:88vh; border-radius:var(--r); display:flex; flex-direction:column; overflow:hidden; }
.ci-modal-hdr { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 20px 16px; border-bottom:1px solid var(--bd); flex-shrink:0; }
.ci-modal-title { font-size:15px; font-weight:700; color:var(--t1); flex:1; min-width:0; }
.ci-modal-body { flex:1; overflow-y:auto; padding:18px 20px; }
.ci-modal-ft { padding:14px 20px; border-top:1px solid var(--bd); flex-shrink:0; display:flex; gap:8px; }
.ci-sect-lbl { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.ci-copy-btn { background:none; border:none; color:var(--t3); cursor:pointer; font-size:14px; padding:0 2px; line-height:1; transition:color .12s; font-family:var(--f); }
.ci-copy-btn:hover { color:var(--teal); }
.ci-caption-blk { background:var(--inp); border:1px solid var(--bd); padding:13px; font-size:12px; line-height:1.65; color:var(--t2); white-space:pre-wrap; font-family:var(--f); max-height:160px; overflow-y:auto; }
.ci-slide-nav { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.ci-slide-tab { font-family:var(--f); font-size:11px; font-weight:700; padding:4px 11px; border-radius:2px; border:1px solid var(--bdm); background:transparent; color:var(--t3); cursor:pointer; transition:all .13s; }
.ci-slide-tab.active { background:var(--teal-dim); border-color:var(--teal-b); color:var(--teal); }
.ci-slide-panel { display:block; }
.ci-slide-panel.hidden { display:none; }
.ci-slide-tekst { font-size:13px; color:var(--t1); line-height:1.6; padding:12px; background:var(--inp); border:1px solid var(--bd); white-space:pre-wrap; }
.ci-visual-blk { background:rgba(255,255,255,.04); border:1px solid var(--bdm); padding:12px; font-size:11.5px; color:var(--t2); line-height:1.55; font-style:italic; white-space:pre-wrap; }
  </style>
</head>

  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('sb_token', d.access_token);
    localStorage.setItem('sb_refresh', d.refresh_token);
    H['Authorization'] = 'Bearer ' + d.access_token;
    return true;
  }
  return false;
}

async function refreshToken() {
  const refresh = localStorage.getItem('sb_refresh');
  if (!refresh) { showLogin(); return; }
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refresh })
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('sb_token', d.access_token);
    localStorage.setItem('sb_refresh', d.refresh_token);
    H['Authorization'] = 'Bearer ' + d.access_token;
    return true;
  } else {
    showLogin();
    return false;
  }
}

async function sbGetSafe(table, params='') {
  try {
    return await sbGet(table, params);
  } catch(e) {
    if (e.message.includes('JWT') || e.message.includes('expired')) {
      const ok = await refreshToken();
      if (ok) return await sbGet(table, params);
    }
    throw e;
  }
}

function logout() {
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_refresh');
  location.reload();
}

async function doLogin() {

  const btn   = document.getElementById('li-btn');

  btn.textContent = 'Bezig...'; btn.disabled = true; err.style.display = 'none';
  const ok = await login(email, pass);

    document.getElementById('loginScreen').remove();
    document.querySelector('.app').style.display = 'flex';
    init();
  } else {
    err.textContent = 'Onjuist e-mailadres of wachtwoord';
    err.style.display = 'block';
    btn.textContent = 'Inloggen'; btn.disabled = false;
  }

async function sbGet(table, params='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {headers:H});

}
async function sbPatch(table, id, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {method:'PATCH',headers:H,body:JSON.stringify(body)});

async function sbPost(table, body) {

  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {method:'DELETE',headers:H});

}

    // Laad reeksen en losse ideeën parallel

      </div>
      <div id="reeksen-container">${renderReeksSection(reeksen)}</div>
      <div class="reeks-sectie-hdr" style="margin-top:20px;margin-bottom:10px;">
        <span class="reeks-sectie-titel">Losse ideeën <span style="color:var(--t3);font-weight:400;">(${ciIdeeën.length})</span></span>
      </div>

function openNieuweReeksModal(){
  document.getElementById('nieuweReeksModal').classList.add('open');
}
function sluitNieuweReeksModal(){
  document.getElementById('nieuweReeksModal').classList.remove('open');
  document.getElementById('nr-naam').value='';
  document.getElementById('nr-onderwerp').value='';
  document.getElementById('nr-pilaar').value='';
  document.getElementById('nr-platform').value='linkedin';
  document.getElementById('nr-aantal').value='5';
  document.getElementById('nr-err').textContent='';
  const btn=document.getElementById('nr-genereer-btn');
  btn.disabled=false;btn.textContent='⚡ Genereer reeks';
}

async function genereerReeks(){
  const naam=document.getElementById('nr-naam').value.trim();
  const onderwerp=document.getElementById('nr-onderwerp').value.trim();
  const pilaar=document.getElementById('nr-pilaar').value;
  const platform=document.getElementById('nr-platform').value;
  const aantal_posts=Math.min(8,Math.max(3,parseInt(document.getElementById('nr-aantal').value)||5));
  const err=document.getElementById('nr-err');
  const btn=document.getElementById('nr-genereer-btn');
  err.textContent='';
  if(!naam){err.textContent='Naam is verplicht.';return;}
  if(!onderwerp){err.textContent='Onderwerp is verplicht.';return;}
  btn.disabled=true;btn.textContent='Bezig...';
  try{
    // 1. Sla reeks op
    const inserted=await sbPost('content_reeksen',{naam,onderwerp,pilaar,platform,aantal_posts,status:'idee'});
    const reeks_id=(Array.isArray(inserted)?inserted[0]:inserted)?.id;
    if(!reeks_id) throw new Error('Geen reeks ID ontvangen van de database');
    // 2. Roep Edge Function aan
    const token=localStorage.getItem('sb_token')||SB_KEY;
    const resp=await fetch(`${SB_URL}/functions/v1/genereer-reeks`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify({reeks_id,naam,onderwerp,pilaar,platform,aantal_posts})
    });
    const result=await resp.json();
    if(!resp.ok) throw new Error(result.error||'Edge Function fout');
    // 3. Open de nieuwe reeks direct
    expandedReeksen.add(reeks_id);
    _reeksIdeeënCache[reeks_id]=null; // forceer reload
    sluitNieuweReeksModal();
    toast('Reeks aangemaakt ✓');
    await tContent();
  }catch(e){
    err.textContent='Fout: '+e.message;
    btn.disabled=false;btn.textContent='⚡ Genereer reeks';
  }
}

async function toggleReeks(id){
  if(expandedReeksen.has(id)){
    expandedReeksen.delete(id);
  } else {
    expandedReeksen.add(id);
    if(!_reeksIdeeënCache[id]){
      _reeksIdeeënCache[id]=await sbGetSafe('content_ideas',`select=*&reeks_id=eq.${id}&order=created_at.asc`).catch(()=>[]);
    }
  }
  // Herrender alleen de reeksen container (niet hele tab)
  const container=document.getElementById('reeksen-container');
  if(!container) return;
  const reeksen=await sbGetSafe('content_reeksen','select=*&order=created_at.desc').catch(()=>[]);
  container.innerHTML=renderReeksSection(reeksen);
}

function renderReeksSection(reeksen){
  if(!reeksen||reeksen.length===0){
    return `<div style="color:var(--t3);font-size:12px;padding:14px 16px;border:1px dashed rgba(255,255,255,.08);border-radius:var(--r);text-align:center;margin-bottom:4px;">Nog geen reeksen. Maak een reeks aan om meerdere posts rond één thema te plannen.</div>`;
  }
  return reeksen.map(reeks=>{
    const isExp=expandedReeksen.has(reeks.id);
    const sBadge={'idee':'<span class="reeks-status-b reeks-b-idee">Idee</span>','actief':'<span class="reeks-status-b reeks-b-actief">Actief</span>','afgerond':'<span class="reeks-status-b reeks-b-afgerond">Afgerond</span>'}[reeks.status]||'';
    const platLbl={'linkedin':'LinkedIn','instagram':'Instagram','website':'Website'}[reeks.platform]||reeks.platform||'';
    const platCls=reeks.platform||'linkedin';
    const statusBtn=reeks.status==='idee'
      ?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();updateReeksStatus('${reeks.id}','actief')" style="font-size:10px;padding:2px 8px;">→ Actief</button>`
      :reeks.status==='actief'
      ?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();updateReeksStatus('${reeks.id}','afgerond')" style="font-size:10px;padding:2px 8px;">→ Afgerond</button>`:'';
    let bodyHtml='';
    if(isExp){
      const ideeën=_reeksIdeeënCache[reeks.id]||[];
      bodyHtml=`<div class="reeks-body">${
        ideeën.length
          ?`<div class="ci-grid" style="margin-top:12px;">${ideeën.map(ciKaart).join('')}</div>`
          :`<div style="color:var(--t3);font-size:12px;padding:12px 0;">Geen posts gevonden — de Edge Function vult deze reeks automatisch.</div>`
      }</div>`;
    }
    return `<div class="reeks-card">
      <div class="reeks-hdr" onclick="toggleReeks('${reeks.id}')">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden;">
          <span style="font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${reeks.naam}</span>
          ${sBadge}
          <span class="plat-b ${platCls}" style="flex-shrink:0;">${platLbl}</span>
          ${reeks.pilaar?`<span style="font-size:9.5px;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;font-weight:600;flex-shrink:0;">${reeks.pilaar}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="font-size:10.5px;color:var(--t3);">${reeks.aantal_posts||0} posts</span>
          ${statusBtn}
          <span class="reeks-chevron${isExp?' open':''}">▼</span>
        </div>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');
}

function _cmpStatusBadge(s){

async function slaanCampagneOp(){
  const naam=document.getElementById('cmp-naam').value.trim();
  const err=document.getElementById('cmp-err');
  const btn=document.getElementById('cmp-save-btn');
  err.textContent='';
  if(!naam){err.textContent='Naam is verplicht.';return;}
  const platforms=['linkedin','meta','google'].filter(p=>document.getElementById('cmp-plat-'+p).checked);
  const body={
    naam,
    doel:document.getElementById('cmp-doel').value,
    doelgroep:document.getElementById('cmp-doelgroep').value.trim()||null,
    budget:parseFloat(document.getElementById('cmp-budget').value)||null,
    looptijd_start:document.getElementById('cmp-start').value||null,
    looptijd_eind:document.getElementById('cmp-eind').value||null,
    platforms,
    notities:document.getElementById('cmp-notities').value.trim()||null,
  };
  btn.disabled=true;btn.textContent='Bezig...';
  try{
    const editId=document.getElementById('cmp-edit-id').value;
    if(editId){
      await sbPatch('campagnes',editId,body);
      if(activeCampagneId===editId){/* blijf in detail */}
    } else {
      await sbPost('campagnes',{...body,status:'concept'});
    }
    sluitCampagneModal();
    toast('Campagne opgeslagen ✓');
    await tCampagnes();
  }catch(e){
    err.textContent='Fout: '+e.message;
    btn.disabled=false;btn.textContent='Opslaan';
  }
}

function ciKaart(idee){
  const platCls=idee.platform||'linkedin';
  if(idee.status==='afgewezen'){
    return `<div class="ci-card">
      <div class="ci-hdr">
        <span class="plat-b ${platCls}">${ciPlatLabel(idee.platform)}</span>
        <span class="ci-badge" style="background:rgba(229,53,53,.1);color:var(--red);border:1px solid rgba(229,53,53,.2);margin-left:auto;">Afgewezen</span>
      </div>
      <div class="ci-onderwerp" style="text-decoration:line-through;opacity:.45;">${idee.onderwerp||'–'}</div>
      ${idee.pilaar?`<div class="ci-pilaar" style="opacity:.4;">${idee.pilaar}</div>`:''}
      ${idee.afwijzing_reden?`<div style="font-size:11px;color:var(--t3);font-style:italic;margin-top:4px;line-height:1.5;">${idee.afwijzing_reden}</div>`:''}
    </div>`;
  }
  const badge=idee.status==='concept'?`<span class="ci-badge ci-badge-concept">✓ Concept klaar</span>`:
               idee.status==='gepland' ?`<span class="ci-badge ci-badge-gepland">Gepland</span>`:
               idee.status==='gepost'  ?`<span class="ci-badge ci-badge-gepost">Gepost</span>`:'';
  const klikbaar=idee.status==='concept';
  let footer='';
  if(idee.status==='concept'){
    footer=`<div class="ci-footer" style="display:flex;gap:6px;align-items:center;">
      <button class="btn btn-green btn-sm" onclick="openConceptPopup('${idee.id}')">Bekijk concept</button>
      <button class="btn btn-ghost-red btn-sm" onclick="openAfwijsIdeeModal('${idee.id}')">Afwijzen</button>
    </div>`;
  } else if(idee.status==='idee'||!idee.status){
    footer=`<div class="ci-footer" style="display:flex;gap:6px;align-items:center;">
      <button id="ci-btn-${idee.id}" class="btn btn-green btn-sm" onclick="genereerPost('${idee.id}',this)">⚡ Genereer post</button>
      <button class="btn btn-ghost-red btn-sm" onclick="openAfwijsIdeeModal('${idee.id}')">Afwijzen</button>
    </div>`;
  } else if(idee.status==='gepland'&&idee.gepland_datum){
    const t=new Date(idee.gepland_datum).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    footer=`<div class="ci-footer"><span style="font-size:10.5px;color:var(--t3);">⏰ ${t}</span></div>`;
  }
  return `<div class="ci-card${klikbaar?' clickable':''}"${klikbaar?` onclick="openConceptPopup('${idee.id}')"`:''}>
    <div class="ci-hdr">
      <span class="plat-b ${platCls}">${ciPlatLabel(idee.platform)}</span>
      ${idee.format?`<span class="ci-fmt-b">${ciFmtLabel(idee.format)}</span>`:''}
      ${badge}
    </div>
    <div class="ci-onderwerp">${idee.onderwerp||'–'}</div>
    ${idee.pilaar?`<div class="ci-pilaar">${idee.pilaar}</div>`:''}
    ${idee.aanleiding?`<div class="ci-aanleiding">${idee.aanleiding}</div>`:''}
    ${footer}
  </div>`;
}

function ciSlides(idee){
  const slides=[];
  for(let i=1;i<=12;i++){
    const tekst=idee[`slide_${i}_tekst`];
    const visual=idee[`slide_${i}_visual`];
    if(tekst||visual) slides.push({idx:i,tekst,visual});
  }
  return slides;
}

function openConceptPopup(id){
  ciActiveIdee=ciIdeeën.find(i=>i.id===id);
  if(!ciActiveIdee) return;
  const idee=ciActiveIdee;
  document.getElementById('ciModalTitle').textContent=idee.onderwerp||'–';
  document.getElementById('ciModalPlatBadge').className=`plat-b ${idee.platform||'linkedin'}`;
  document.getElementById('ciModalPlatBadge').textContent=ciPlatLabel(idee.platform);
  document.getElementById('ciModalFmtBadge').className='ci-fmt-b';
  document.getElementById('ciModalFmtBadge').textContent=ciFmtLabel(idee.format);
  const isSlides=['carrousel','infographic'].includes(idee.format);
  const slides=isSlides?ciSlides(idee):[];
  let body=`<div style="margin-bottom:18px;">
    <div class="ci-sect-lbl">Caption <button class="ci-copy-btn" onclick="ciCopy('caption')">⎘</button></div>
    <div class="ci-caption-blk">${idee.caption||'–'}</div>
  </div>`;
  if(isSlides&&slides.length){
    body+=`<div class="ci-sect-lbl">Slides</div>
    <div class="ci-slide-nav">${slides.map((s,i)=>`<button class="ci-slide-tab${i===0?' active':''}" onclick="ciSetSlide(${i})">${s.idx}</button>`).join('')}</div>
    <div>${slides.map((s,i)=>`<div class="ci-slide-panel${i===0?'':' hidden'}" id="ciSp-${i}">
      ${s.tekst?`<div class="ci-sect-lbl">Slide tekst <button class="ci-copy-btn" onclick="ciCopySlide(${i},'tekst')">⎘</button></div><div class="ci-slide-tekst">${s.tekst}</div>`:''}
      ${s.visual?`<div class="ci-sect-lbl" style="margin-top:12px;">Nanoo Banana prompt <button class="ci-copy-btn" onclick="ciCopySlide(${i},'visual')">⎘</button></div><div class="ci-visual-blk">${s.visual}</div>`:''}
    </div>`).join('')}</div>`;
  } else {
    const visual=idee.slide_1_visual||idee.visual_prompt||'';
    if(visual) body+=`<div style="margin-top:16px;"><div class="ci-sect-lbl">Nanoo Banana prompt <button class="ci-copy-btn" onclick="ciCopy('slide_1_visual')">⎘</button></div><div class="ci-visual-blk">${visual}</div></div>`;

  document.getElementById('ciModalFt').innerHTML=`

function renderGeplandAgenda(ideeën){
  if(!ideeën.length) return '<div class="empty">Geen geplande posts</div>';
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
  const groups={};
  ideeën.forEach(i=>{
    const d=i.gepland_datum?new Date(i.gepland_datum):null;
    let key,label;
    if(!d){key='z_geen';label='Geen datum';}
    else{
      const dd=new Date(d);dd.setHours(0,0,0,0);
      if(dd.getTime()===today.getTime()){key='0_vandaag';label='Vandaag';}
      else if(dd>today&&dd<=weekEnd){key='1_dezeweek';label='Deze week';}
      else{
        const ds=dd.toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
        key=`2_${dd.toISOString()}`;label=ds;
      }
    }
    if(!groups[key])groups[key]={label,items:[]};
    groups[key].items.push(i);
  });
  return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([,g])=>`
    <div class="reacties-datum-header">${g.label}</div>
    <div class="ci-grid">${g.items.map(ciKaart).join('')}</div>
  `).join('');
}

async function tTaken(){
  try{
    const all=await sbGetSafe('tasks','select=id,titel,categorie,type,prioriteit,toegewezen_aan,deadline,status,urgent,bron,bron_id');
    const today=new Date();today.setHours(0,0,0,0);
    // filter
    let tasks=all.filter(t=>{
      const done=t.status==='klaar'||t.status==='done';
      const statusOk=tFilterStatus==='alle'?true
        :tFilterStatus==='open'?(!done&&t.status!=='bezig')
        :tFilterStatus==='bezig'?t.status==='bezig'
        :done;
      const pers=t.toegewezen_aan||'';
      const persOk=tFilterPersoon==='iedereen'?true
        :tFilterPersoon==='finn'?pers.toLowerCase()==='finn'
        :tFilterPersoon==='olaf'?pers.toLowerCase()==='olaf'
        :!pers;
      return statusOk&&persOk;
    });
    // sort: done last → urgent → prioriteit → deadline
    tasks.sort((a,b)=>{
      const ad=a.status==='klaar'||a.status==='done', bd=b.status==='klaar'||b.status==='done';
      if(ad!==bd) return ad?1:-1;
      if(!!a.urgent!==!!b.urgent) return b.urgent?1:-1;
      const ap=Number(a.prioriteit)||3, bp=Number(b.prioriteit)||3;
      if(ap!==bp) return ap-bp;
      if(a.deadline&&b.deadline) return new Date(a.deadline)-new Date(b.deadline);
      return a.deadline?-1:b.deadline?1:0;
    });
    tasks.forEach(t=>{ _taakDataMap[t.id]=t; });
    const catLabel={leads:'Leads',sdr:'Leads',content:'Content',linkedin:'LinkedIn',intern:'Intern'};
    const dlHtml=t=>{
      if(!t.deadline) return '';
      const dl=new Date(t.deadline);dl.setHours(0,0,0,0);
      const done=t.status==='klaar'||t.status==='done';
      const cls=done?'':dl<today?'overdue':dl.getTime()===today.getTime()?'today':'';
      return `<span class="t-dl${cls?' '+cls:''}">${fmtDate(t.deadline)}</span>`;
    };
    const rows=tasks.map(t=>{
      const done=t.status==='klaar'||t.status==='done';
      const urg=t.urgent&&!done;
      const cat=(t.categorie||t.type||'intern').toLowerCase();
      const prioN=Number(t.prioriteit)||3;
      const prioCls=prioN===1?'hoog':prioN===2?'middel':'laag';
      const persCls=t.toegewezen_aan?.toLowerCase()==='finn'?'t-pers-finn':t.toegewezen_aan?.toLowerCase()==='olaf'?'t-pers-olaf':'t-pers-other';
      return `<div class="task-row${done?' done':''}${urg?' urg':''}">
        <div class="cb${done?' on':''}" onclick="togT('${t.id}',${done})"></div>
        <div class="prio-dot ${prioCls}"></div>
        <span class="t-name">${t.titel}</span>
        <span class="t-cat ${cat}">${catLabel[cat]||cap(cat)}</span>
        ${t.toegewezen_aan?`<span class="t-pers ${persCls}">${t.toegewezen_aan}</span>`:''}
        ${dlHtml(t)}
        ${t.bron==='systeem'?'<span class="t-sys">⚙</span>':''}
        ${t.bron_id?`<button onclick="taakNavigeer('${t.id}')" class="btn btn-ghost btn-xs" title="Ga naar">→</button>`:''}
      </div>`;
    }).join('');
    document.getElementById('ca').innerHTML=`
      <div class="taken-hdr">
        <span style="font-size:12px;color:var(--t3)">${tasks.length} ${tasks.length===1?'taak':'taken'}</span>
        <button class="btn btn-teal btn-sm" onclick="openTaakModal()">+ Taak toevoegen</button>
      </div>
      <div class="filter-double">
        <div class="filter-row">${['Alle','Open','Bezig','Klaar'].map(f=>`<button class="fbtn${tFilterStatus===f.toLowerCase()?' active':''}" onclick="setTFS('${f.toLowerCase()}')">${f}</button>`).join('')}</div>
        <div class="filter-row">${['Iedereen','Finn','Olaf','Niet toegewezen'].map(f=>`<button class="fbtn${tFilterPersoon===f.toLowerCase().replace(' ','_')?' active':''}" onclick="setTFP('${f.toLowerCase().replace(' ','_')}')">${f}</button>`).join('')}</div>
      </div>
      <div class="tasks-list">${rows||'<div class="empty">Geen taken gevonden</div>'}</div>`;
  }catch(e){document.getElementById('ca').innerHTML=`<div class="err">Fout: ${e.message}</div>`;}
}
const _taakDataMap={};
function setTFS(f){tFilterStatus=f;render('taken');}
function setTFP(f){tFilterPersoon=f;render('taken');}
function taakNavigeer(id){
  const t=_taakDataMap[id];
  if(!t||!t.bron_id) return;
  const cat=(t.categorie||t.type||'').toLowerCase();
  if(cat==='leads'||cat==='sdr'){
    lFase='leads';lFilter='alle';
    expanded.add(t.bron_id);
    go('leadfunnel');
  } else if(cat==='linkedin'){
    rReacties='nieuw';
    go('reacties');
  } else if(cat==='content'){
    cFilter='concept';
    go('content');
  }
}
async function togT(id,isDone){
  try{await sbPatch('tasks',id,{status:isDone?'open':'klaar'});render('taken');}
  catch(e){toast('Fout: '+e.message);}
}
function openTaakModal(){
  document.getElementById('taakModal').classList.add('open');
  document.getElementById('tm-titel').value='';
  document.getElementById('tm-cat').value='leads';
  document.getElementById('tm-prio').value='2';
  document.getElementById('tm-pers').value='';
  document.getElementById('tm-dl').value='';
}
function closeTaakModal(){document.getElementById('taakModal').classList.remove('open');}
async function saveTaak(){
  const titel=document.getElementById('tm-titel').value.trim();
  if(!titel){toast('Titel is verplicht');return;}
  const btn=document.getElementById('tm-save');
  btn.disabled=true;btn.textContent='Opslaan...';
  try{
    const prio=parseInt(document.getElementById('tm-prio').value)||2;
    await sbPost('tasks',{
      titel,
      categorie:document.getElementById('tm-cat').value,
      prioriteit:prio,
      toegewezen_aan:document.getElementById('tm-pers').value||null,
      deadline:document.getElementById('tm-dl').value||null,
      status:'open',
      bron:'handmatig',
      urgent:prio===1
    });
    closeTaakModal();
    toast('Taak toegevoegd ✓');
    render('taken');
  }catch(e){toast('Fout: '+e.message);}
  btn.disabled=false;btn.textContent='Opslaan';
}

// ── LEAD STATISTIEKEN ──────────────────────────────────
async function laadLeadStats() {
  const el = document.getElementById('leadStatsContainer');
  if (!el) return;
  el.innerHTML = '<div class="loading">Statistieken laden...</div>';
  try {
    const leads = await sbGetSafe('leads','select=id,naam,organisatie,tier,icp_score,status,fase_detail,instroompunt,created_at,verwerkt&order=icp_score.desc');
    const nu = Date.now();
    const d7  = new Date(nu - 7*864e5);
    const d30 = new Date(nu - 30*864e5);
    const totaal    = leads.length;
    const t1        = leads.filter(l=>l.tier===1).length;
    const t2        = leads.filter(l=>l.tier===2).length;
    const nieuw     = leads.filter(l=>l.status==='nieuw').length;
    const benaderd  = leads.filter(l=>l.status==='benaderd').length;
    const gereageerd= leads.filter(l=>l.status==='gereageerd').length;
    const afgewezen = leads.filter(l=>l.status==='afgewezen').length;
    const dezeWeek  = leads.filter(l=>new Date(l.created_at)>=d7).length;
    const dezeMaand = leads.filter(l=>new Date(l.created_at)>=d30).length;
    const verwerkt  = leads.filter(l=>l.verwerkt===true).length;
    const verwerkPct= totaal?Math.round(verwerkt/totaal*100):0;
    const convBen   = totaal?Math.round(benaderd/totaal*100):0;
    const convReag  = benaderd?Math.round(gereageerd/benaderd*100):0;
    const top5      = leads.slice(0,5);

    // Funnel data
    const fFasen  = ['prospecting','gekwalificeerd','probleemanalyse','offerte','gewonnen'];
    const fLabels = ['Prospecting','Gekwalificeerd','Analyse','Offerte','Gewonnen'];
    const fCounts = fFasen.map(f=>leads.filter(l=>l.fase_detail===f).length);
    const fColors = ['rgba(87,96,87,.85)','rgba(168,224,224,.85)','rgba(251,146,60,.85)','rgba(167,139,250,.85)','rgba(0,181,147,.85)'];

    // Instroompunten
    const iMap={};
    leads.forEach(l=>{const k=l.instroompunt||'onbekend';iMap[k]=(iMap[k]||0)+1;});
    const iLab={handmatig:'Handmatig',sdr:'SDR Pipeline',warm_netwerk:'Warm netwerk',website:'Website',email:'Email',onbekend:'Onbekend'};
    const iKeys=Object.keys(iMap);
    const iVals=iKeys.map(k=>iMap[k]);
    const iPalette=['rgba(0,181,147,.85)','rgba(168,224,224,.85)','rgba(251,146,60,.85)','rgba(167,139,250,.85)','rgba(245,197,66,.85)','rgba(87,96,87,.85)'];

    // Timeline: laatste 8 weken
    const wkLbl=[],wkCnt=[];
    for(let i=7;i>=0;i--){
      const ws=new Date(nu-(i+1)*7*864e5),we=new Date(nu-i*7*864e5);
      wkLbl.push(ws.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}));
      wkCnt.push(leads.filter(l=>{const d=new Date(l.created_at);return d>=ws&&d<we;}).length);
    }

    el.innerHTML = `
      <div class="w-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px;">
        <div class="widget w-teal"><div class="w-num">${totaal}</div><div class="w-label">Totaal leads</div><div class="w-sub">${dezeWeek} deze week · ${dezeMaand} deze maand</div></div>
        <div class="widget w-sal"><div class="w-num">${t1}</div><div class="w-label">Tier 1</div><div class="w-sub">${t2} Tier 2</div></div>
        <div class="widget w-blue"><div class="w-num">${benaderd}</div><div class="w-label">Benaderd</div><div class="w-sub">${convBen}% van totaal</div></div>
        <div class="widget w-gray"><div class="w-num">${gereageerd}</div><div class="w-label">Gereageerd</div><div class="w-sub">${convReag}% van benaderd</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;">
        <div class="card" style="padding:12px 14px;">
          <div class="card-title">Funnel</div>
          <canvas id="ch-funnel" height="90"></canvas>
        </div>
        <div class="card" style="padding:12px 14px;">
          <div class="card-title">Status</div>

async function laadContentStats() {
  const el = document.getElementById('contentStatsContainer');
  if (!el) return;
  el.innerHTML = '<div class="loading">Statistieken laden...</div>';
  try {
    const [posts, ideeën] = await Promise.all([
      sbGetSafe('content_posts','select=id,platform,status,pillar,created_at').catch(()=>[]),
      sbGetSafe('content_ideas','select=id,platform,status,pillar,created_at').catch(()=>[])
    ]);
    const nu = Date.now();
    const d30 = new Date(nu - 30*864e5);
    const totaalPosts  = posts.length;
    const gepost       = posts.filter(p=>p.status==='gepost').length;
    const gepland      = posts.filter(p=>p.status==='gepland').length;
    const concept      = posts.filter(p=>p.status==='concept').length;
    const dezeMaand    = posts.filter(p=>new Date(p.created_at)>=d30).length;
    const totaalIdeeën = ideeën.length;
    const actieveIdeeën   = ideeën.filter(i=>!['afgewezen','gepost'].includes(i.status)).length;
    const afgewezenIdeeën = ideeën.filter(i=>i.status==='afgewezen').length;

    // Platform data

    const platClrsD = ['rgba(91,164,232,.35)','rgba(240,112,144,.35)','rgba(0,181,147,.35)'];
    const platTot   = platKeys.map(p=>posts.filter(x=>x.platform===p).length);
    const platGep   = platKeys.map(p=>posts.filter(x=>x.platform===p&&x.status==='gepost').length);

    // Pillar data (ideas table because posts may be empty)
    const pillarMap = {};
    [...posts,...ideeën].forEach(p=>{const k=p.pillar||'Onbekend';pillarMap[k]=(pillarMap[k]||0)+1;});
    const pillarE   = Object.entries(pillarMap).sort((a,b)=>b[1]-a[1]);
    const pillarLbl = pillarE.map(([k])=>k);
    const pillarVal = pillarE.map(([,v])=>v);

    // Content pipeline (ideas)
    const ideeCount  = ideeën.filter(i=>!i.status||i.status==='idee').length;

    // Posts per week (laatste 8 weken)
    const wkLbl=[],wkGep=[],wkNew=[];
    for(let i=7;i>=0;i--){
      const ws=new Date(nu-(i+1)*7*864e5),we=new Date(nu-i*7*864e5);
      wkLbl.push(ws.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}));
      wkNew.push(posts.filter(p=>{const d=new Date(p.created_at);return d>=ws&&d<we;}).length);
      wkGep.push(posts.filter(p=>{const d=new Date(p.created_at);return d>=ws&&d<we&&p.status==='gepost';}).length);
    }

    el.innerHTML = `
      <div class="w-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px;">

        borderWidth:0,hoverOffset:8

async function genereerRapport() {
  const btn = document.getElementById('btnGenereerRapport');
  const loading = document.getElementById('analyseLoading');
  const errorEl = document.getElementById('analyseError');
  const successEl = document.getElementById('analyseSuccess');
  btn.disabled = true;
  loading.style.display = 'flex';
  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  try {
    const token = localStorage.getItem('sb_token') || SB_KEY;
    const response = await fetch(`${SB_URL}/functions/v1/analyse-agent`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ periode: 'maand' })
    });
    const result = await response.json();
    if (!result.success) throw new Error(result.error || 'Onbekende fout');
    successEl.style.display = 'block';
    successEl.textContent = `✅ Rapport gegenereerd! ${result.geanalyseerd.posts} posts en ${result.geanalyseerd.signalen} signalen geanalyseerd.`;
    await laadLaatstRapport();
  } catch (err) {
    errorEl.style.display = 'block';
    errorEl.textContent = `❌ Fout: ${err.message}`;
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

  return `<div class="rapport-card">

    <span class="platform-badge ${badgeClass}">${icon} ${naam}</span>

const _agentData={};
async function tAgents(){
  try{
    const agents=await sbGetSafe('agents','select=id,nummer,naam,instructies&order=nummer.asc');
    const runsPerAgent=await Promise.all((agents||[]).map(a=>
      sbGetSafe('agent_runs',`select=status,resultaat,fout_melding,created_at&agent_nummer=eq.${a.nummer}&order=created_at.desc&limit=20`)
        .catch(()=>[])
    ));
    (agents||[]).forEach(a=>{ _agentData[a.id]=a; });
    const cards=(agents||[]).map((a,i)=>{
      const runs=Array.isArray(runsPerAgent[i])?runsPerAgent[i]:[];
      const laatste=runs[0]||null;
      const succesCount=runs.filter(r=>r.status==='succes').length;
      const succesRate=runs.length?Math.round(succesCount/runs.length*100):null;
      const status=laatste?(laatste.status==='succes'?'actief':laatste.status==='fout'?'fout':'onbekend'):'onbekend';
      const pillLabel=status==='actief'?'Actief':status==='fout'?'Fout':'Onbekend';
      const tijdLabel=laatste?relTijd(laatste.created_at):'Nooit gedraaid';
      const resultaatTekst=laatste?(laatste.status==='fout'&&laatste.fout_melding?laatste.fout_melding:laatste.resultaat||'—'):'—';
      const metaRate=succesRate!==null?`${succesRate}% succes (${runs.length})`:runs.length?`${runs.length} runs`:'Geen runs';
      return `<div class="ag-card">
        <div class="ag-top">
          <div class="ag-num">${a.nummer}</div>
          <div class="ag-name">${a.naam}</div>
          <span class="ag-pill ${status}">${pillLabel}</span>
        </div>
        <div class="ag-meta">${metaRate}<span class="ag-meta-sep">·</span>${tijdLabel}</div>
        <div class="ag-last">${resultaatTekst}</div>
        <div class="ag-ft">
          <button class="ag-edit-btn" onclick="openAgentModal('${a.id}')">Instructies</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('ca').innerHTML=`<div class="ag-grid">${cards||'<div style="color:var(--t3);padding:20px">Geen agents gevonden</div>'}</div>`;
  }catch(e){
    document.getElementById('ca').innerHTML=`<div style="color:var(--t3);padding:20px">Fout bij laden: ${e.message}</div>`;
  }
}
function relTijd(dateStr){
  if(!dateStr) return '—';
  const diff=Math.floor((Date.now()-new Date(dateStr))/1000);
  if(diff<60) return 'Zojuist';
  if(diff<3600) return `${Math.floor(diff/60)} min geleden`;
  if(diff<86400) return `${Math.floor(diff/3600)} uur geleden`;
  const d=Math.floor(diff/86400);
  if(d===1) return 'Gisteren';
  if(d<7) return `${d} dagen geleden`;
  return new Date(dateStr).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
}

  btn.disabled=false;btn.textContent='Opslaan';
}

// ── LEAD MODAL ─────────────────────────────────────────
function openLeadModal(){document.getElementById('leadModal').classList.add('open');}
function closeLeadModal(){document.getElementById('leadModal').classList.remove('open');}
async function saveLead(){
  const naam=document.getElementById('lm-naam').value.trim();
  const org=document.getElementById('lm-org').value.trim();
  if(!naam||!org){toast('Naam en organisatie zijn verplicht');return;}
  const btn=document.getElementById('lm-save');
  btn.disabled=true;btn.textContent='Opslaan...';
  try{
    await sbPost('leads',{
      naam,organisatie:org,
      functie:document.getElementById('lm-functie').value.trim()||null,
      linkedin_url:document.getElementById('lm-li').value.trim()||null,
      tier:parseInt(document.getElementById('lm-tier').value),
      icp_score:parseInt(document.getElementById('lm-score').value)||null,
      notities:document.getElementById('lm-notities').value.trim()||null,
      instroompunt:document.getElementById('lm-instroompunt').value||null,
      admin:document.getElementById('lm-admin').value||null,
      kvk_nummer:document.getElementById('lm-kvk').value.trim()||null,
      vennootschap:document.getElementById('lm-vennootschap').value.trim()||null,
      status:'nieuw',fase:'leads',fase_detail:'prospecting'
    });
    closeLeadModal();
    toast('Lead opgeslagen in Supabase ✓');
    if(tab==='leadfunnel'||tab==='overzicht')render(tab);
  }catch(e){toast('Fout bij opslaan: '+e.message);}
  btn.disabled=false;btn.textContent='Opslaan';
}

// ── FASE DETAIL HELPERS ────────────────────────────────
function faseBadge(fd){
  const m={
    prospecting:{t:'Prospecting',bg:'rgba(87,96,87,.18)',c:'var(--t3)',b:'var(--bdm)'},
    gekwalificeerd:{t:'Gekwalificeerd',bg:'var(--blue-dim)',c:'var(--blue)',b:'var(--blue-b)'},
    probleemanalyse:{t:'Analyse',bg:'rgba(251,146,60,.12)',c:'#fb923c',b:'rgba(251,146,60,.3)'},
    offerte:{t:'Offerte',bg:'rgba(167,139,250,.12)',c:'#a78bfa',b:'rgba(167,139,250,.3)'},
    gewonnen:{t:'Gewonnen ✓',bg:'var(--teal-dim)',c:'var(--teal)',b:'var(--teal-b)'},
    verloren:{t:'Verloren',bg:'rgba(229,53,53,.12)',c:'var(--red)',b:'rgba(229,53,53,.3)'}
  }[fd];
  if(!m)return'';
  return `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;background:${m.bg};color:${m.c};border:1px solid ${m.b};flex-shrink:0;">${m.t}</span>`;
}

function volgendeFaseBtn(l){
  const flow={
    prospecting:{next:'gekwalificeerd',label:'→ Gekwalificeerd'},
    gekwalificeerd:{next:'probleemanalyse',label:'→ Probleemanalyse'},
    probleemanalyse:{next:'offerte',label:'→ Offerte'},
    offerte:{next:'gewonnen',label:'→ Gewonnen'}
  }[l.fase_detail];
  if(!flow)return'';
  return `<button class="btn btn-teal btn-sm" onclick="setFaseDetail('${l.id}','${flow.next}')">${flow.label}</button>`;
}

    await sbPatch('leads',leadId,{fase_detail:nieuweFase});

// ── HELPERS ────────────────────────────────────────────
function sigRow(s){
  return `<div class="sig-item">
    <span class="sig-b ${s.type||'nieuws'}">${cap(s.type||'nieuws')}</span>
    <div class="sig-inf">
      <div class="sig-t">${s.titel}</div>
      <div class="sig-m">${s.bron||'–'} · ${fmtDate(s.datum)}</div>
      ${s.samenvatting?`<div class="sig-sum">${s.samenvatting}</div>`:''}
      ${s.content_idee?`<div class="sig-idee">💡 ${s.content_idee}</div>`:''}
      ${s.url?`<a href="${s.url}" target="_blank" class="btn btn-ghost btn-xs" style="margin-top:6px;display:inline-block;">Bekijk bron →</a>`:''}
    </div>
    <div class="sig-sc"><div class="sig-v">${s.relevantie_score??'–'}/100</div><div class="sig-s">relevantie</div></div>
  </div>`;
}
async function reageerOp(id){
  const r=_reactiesMap[id];
  if(!r) return;
  try{
    if(r.reactie_voorstel) await navigator.clipboard.writeText(r.reactie_voorstel);
    if(r.post_url) window.open(r.post_url,'_blank');
    await sbPatch('sector_reactions',id,{status:'gereageerd'});
    toast('Reactie gekopieerd — LinkedIn geopend ✓');
    render('reacties');
  }catch(e){toast('Fout: '+e.message);}
}
async function slaOver(id){
  try{await sbPatch('sector_reactions',id,{status:'overgeslagen'});render('reacties');}
  catch(e){toast('Fout: '+e.message);}
}

  catch(e){toast('Fout: '+e.message);}
}
function ini(n){return(n||'?').split(' ').filter(Boolean).map(x=>x[0]).join('').toUpperCase().slice(0,2);}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function fmtDate(d){if(!d)return'–';try{return new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}catch{return d;}}
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),320);},2600);
}
function toggleSb(){document.getElementById('sb').classList.toggle('collapsed');}
function runPipe(){toast('Pipeline gestart — agents worden geactiveerd...');}
document.getElementById('leadModal').addEventListener('click',function(e){if(e.target===this)closeLeadModal();});
const _token = localStorage.getItem('sb_token');
if (!_token) {
  showLogin();
} else {
  init();
}
